html {
  background: #000;
  padding:1vh;
  height:100vh;
}
body {
  height:100%;
  width:100%;
  color: #eee;
  
  padding:3vh;
  
  background:
    linear-gradient(
      to bottom,
      transparent 75%,
      rgba(0,0,0,.15) 75%
    ) 0 0 / 100% 4px repeat,
    
    radial-gradient(
      ellipse closest-side at center,
      transparent 100%,
      black 200%
    ) center / 100% 100% no-repeat,

    #222;
    
  text-shadow:
    1px 0 4px cyan,
    -1px 0 4px magenta,
    -1px 1px 4px yellow;
    
    
  --_r: clamp(0%, 5vh, 20vh);
  --_v: calc(var(--_r)*(1 - sqrt(2)/4));
  --_p: calc(var(--_v) - var(--_r)/2);
  clip-path: inset(0 round 5vh);
	clip-path: shape(
    from var(--_v) var(--_p),
    curve to 50% 0 with var(--_r) 0,
    curve to calc(100% - var(--_v)) var(--_p) with calc(100% - var(--_r)) 0,
    curve to calc(100% - var(--_p)) var(--_v) with calc(100% - 2*var(--_p)) calc(2*var(--_p)),
    curve to 100% 50% with 100% var(--_r),
    curve to calc(100% - var(--_p)) calc(100% - var(--_v)) with 100% calc(100% - var(--_r)),
    curve to calc(100% - var(--_v)) calc(100% - var(--_p)) with calc(100% - 2*var(--_p)) calc(100% - 2*var(--_p)),
    curve to 50% 100% with calc(100% - var(--_r)) 100%,
    curve to var(--_v) calc(100% - var(--_p)) with var(--_r) 100%,
    curve to var(--_p) calc(100% - var(--_v)) with calc(2*var(--_p)) calc(100% - 2*var(--_p)),
    curve to 0 50% with 0 calc(100% - var(--_r)),
    curve to var(--_p) var(--_v) with 0 var(--_r),
    curve to var(--_v) var(--_p) with calc(2*var(--_p)) calc(2*var(--_p))
  );
}

@media (prefers-reduced-motion: no-preference) {
  body { animation: flicker calc(1s/30) infinite alternate; }
}

h1 {
  font-family: TimesNewPixel;
  font-size: 6em;
}

h2 {
  font-family: NESPixel;
  font-size: 6em;
}
p {
  font-family: HelvetiPixel;
  font-size: 3em;
}

@keyframes flicker {
  from {
    text-shadow:
      1px 0 2px cyan,
      -2px 0 2px magenta,
      -1px -1px 2px yellow;
  }
  to {
    text-shadow:
      2px 0px 2px cyan,
      -1px 0px 2px magenta,
      1px 1px 2px yellow;
  }
}
